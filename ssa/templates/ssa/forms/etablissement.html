{% load dsfr_tags %}
<fieldset data-etablissement-fieldset>
    {% for field in form %}
        {% if field.is_hidden %}
            {% dsfr_form_field field %}
        {% else %}
            <div class="fr-fieldset__element">{% dsfr_form_field field %}</div>
        {% endif %}
        {% if field.name == "siret" %}
            <div class="fr-fieldset__element">
                <label for="search-siret-input-">N° SIRET</label>
                <select
                    class="fr-input"
                    type="search"
                    id="search-siret-input-"
                    data-communes-api="{{ COMMUNES_API }}"
                    name="{{ field.html_name }}_search"
                ></select>
            </div>
        {% endif %}
    {% endfor %}
</fieldset>
