<template id="lieu-carte-tpl">
    <div class="fr-card fr-mb-4v" data-testid="lieu-initial">
        <div class="fr-card__body">
            <div class="fr-card__content">
                <div>
                    <h3 class="fr-card__title">
                        <button
                            type="button"
                            aria-controls="modal-add-lieu-__card_id__"
                            data-fr-opened="false"
                            data-id="__card_id__"
                        >
                            __nom__
                        </button>
                    </h3>
                </div>
                <div class="fr-card__desc">
                    <section>
                        __lieu__
                        __labels__
                    </section>

                    <div class="fr-btns-group fr-btns-group--right fr-btns-group--inline-sm fr-btns-group--icon-left fr-mt-4v fr-mb-n4v">
                        <button
                            type="button"
                            class="fr-btn fr-btn--tertiary fr-icon-pencil-line lieu-edit-btn"
                            aria-controls="modal-add-lieu-__card_id__"
                            data-fr-opened="false"
                            data-id="__card_id__"
                            data-testid="lieu-edit-btn"
                        >
                            Modifier
                        </button>
                        <button
                            type="button"
                            class="fr-btn fr-btn--tertiary fr-icon-delete-bin-line lieu-delete-btn"
                            data-fr-opened="false"
                            data-id="__card_id__"
                            data-testid="lieu-delete-btn"
                        >
                            Supprimer
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
