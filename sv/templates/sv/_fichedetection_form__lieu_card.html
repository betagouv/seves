<template id="lieu-carte-tpl">
    <div class="fr-col-12 fr-col-md-6 fr-col-xl-3 with-empty-placeholder--item">
        <div class="fr-card seves-card" data-testid="lieu-initial">
            <div class="fr-card__body">
                <div class="fr-card__content">
                    <div>
                        <h3 class="fr-card__title">
                            <button
                                type="button"
                                aria-controls="modal-add-lieu-__card_id__"
                                data-fr-opened="false"
                                data-id="__card_id__"
                            >
                                __nom__
                            </button>
                        </h3>
                    </div>
                    <div class="fr-card__desc">
                        __lieu__
                        __labels__
                    </div>
                    <div class="fr-card__end">
                        <div class="fr-btns-group fr-btns-group--sm fr-btns-group--right fr-btns-group--inline-lg fr-btns-group--icon-left fr-mb-n4v">
                            <button
                                type="button"
                                class="fr-btn fr-btn--tertiary fr-icon-pencil-line lieu-edit-btn"
                                aria-controls="modal-add-lieu-__card_id__"
                                data-fr-opened="false"
                                data-id="__card_id__"
                                data-testid="lieu-edit-btn"
                            >
                                Modifier
                            </button>
                            <button
                                type="button"
                                class="fr-btn fr-btn--tertiary fr-icon-delete-bin-line lieu-delete-btn"
                                data-fr-opened="false"
                                data-id="__card_id__"
                                data-testid="lieu-delete-btn"
                            >
                                Supprimer
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
